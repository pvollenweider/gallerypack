apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: gallerypack
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gallerypack-secrets
                  key: DB_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: gallerypack
            - name: MYSQL_USER
              value: gallerypack
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gallerypack-secrets
                  key: DB_PASS
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: gallerypack
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
