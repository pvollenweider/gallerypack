# Remplacer pvollenweider par ton username GitHub
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: gallerypack
spec:
  # 2 replicas = 2 builds en parallèle.
  # Budget total max: 2 × 8 CPU + 2 × 10Gi = 16 CPU + 20Gi RAM
  # Il reste ~12Gi pour API, MariaDB, Redis et l'OS sur une machine 32Gi.
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: ghcr.io/pvollenweider/gallerypack-worker:latest
          env:
            - name: NODE_ENV
              value: production
            - name: DB_HOST
              value: mariadb
            - name: DB_NAME
              value: gallerypack
            - name: DB_USER
              value: gallerypack
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: gallerypack-secrets
                  key: DB_PASS
            - name: REDIS_URL
              value: redis://redis:6379
            - name: STORAGE_ROOT
              value: /srv/gallerypack
            # Sharp utilise des worker threads natifs (libuv/libvips).
            # 6 threads = exploite les 8 CPU alloués sans saturer.
            - name: SHARP_CONCURRENCY
              value: "6"
            # Heap Node.js — 8Gi de limite, on laisse 7Gi au heap.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=7168"
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "8"
              memory: 10Gi
          volumeMounts:
            - name: storage
              mountPath: /srv/gallerypack
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: gallerypack-storage
