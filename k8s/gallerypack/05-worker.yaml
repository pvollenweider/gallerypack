# Remplacer pvollenweider par ton username GitHub
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: gallerypack
spec:
  # Augmenter replicas pour des builds parallèles (ex: 2 ou 3).
  # Chaque replica consomme jusqu'à 2 CPU + 2Gi RAM.
  # Assure-toi que le VPS a assez de ressources avant de scaler.
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: ghcr.io/pvollenweider/gallerypack-worker:latest
          env:
            - name: NODE_ENV
              value: production
            - name: DB_HOST
              value: mariadb
            - name: DB_NAME
              value: gallerypack
            - name: DB_USER
              value: gallerypack
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: gallerypack-secrets
                  key: DB_PASS
            - name: REDIS_URL
              value: redis://redis:6379
            - name: STORAGE_ROOT
              value: /srv/gallerypack
          resources:
            requests:
              # Minimum garanti — le pod est schedulé uniquement si disponible
              cpu: 500m
              memory: 512Mi
            limits:
              # Maximum autorisé — le traitement d'images (Sharp/libvips,
              # watermark, EXIF) peut utiliser jusqu'à 2 cœurs et 2 Go.
              # Ajuster selon les specs du VPS (ex: 4 Go sur un VPS 8 Go).
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: storage
              mountPath: /srv/gallerypack
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: gallerypack-storage
