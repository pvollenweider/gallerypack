name: gallerypack-saas

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"
      MYSQL_DATABASE:      "${DB_NAME:-gallerypack}"
      MYSQL_USER:          "${DB_USER:-gallerypack}"
      MYSQL_PASSWORD:      "${DB_PASS:?DB_PASS is required}"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/private:/srv/gallerypack/private   # original uploads (engine reads/writes)
      - ./data/public:/srv/gallerypack/public     # built galleries (engine writes, Caddy reads)
      - ./data/internal:/srv/gallerypack/internal # admin thumbnails, previews (backend only)
      - ./data/app:/app/data                      # persistent server data (license file, etc.)
      - ./data/videos:/srv/gallerypack/videos     # video source files + HLS output
    environment:
      PORT:                "4000"
      NODE_ENV:            "production"
      LICENSE_FILE:        "/app/data/gallerypack.license"
      PLATFORM_MODE:       "${PLATFORM_MODE:-single}"
      BASE_DOMAIN:         "${BASE_DOMAIN:-gallerypack.app}"
      DB_HOST:             "db"
      DB_PORT:             "3306"
      DB_NAME:             "${DB_NAME:-gallerypack}"
      DB_USER:             "${DB_USER:-gallerypack}"
      DB_PASS:             "${DB_PASS:?DB_PASS is required}"
      ADMIN_EMAIL:         "${ADMIN_EMAIL:-admin@localhost}"
      ADMIN_PASSWORD:      "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"
      SESSION_SECRET:      "${SESSION_SECRET:?SESSION_SECRET is required}"
      VIEWER_TOKEN_SECRET: "${VIEWER_TOKEN_SECRET:-change-me-in-production}"
      BASE_URL:            "${BASE_URL:-http://localhost}"
      EMAIL_PROVIDER:      "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:           "${SMTP_HOST:-}"
      SMTP_PORT:           "${SMTP_PORT:-587}"
      SMTP_USER:           "${SMTP_USER:-}"
      SMTP_PASS:           "${SMTP_PASS:-}"
      SMTP_FROM:           "${SMTP_FROM:-}"
      REDIS_URL:           "redis://redis:6379"
      LOG_LEVEL:           "${LOG_LEVEL:-info}"
      UPLOAD_MAX_SIZE_MB:  "${UPLOAD_MAX_SIZE_MB:-100}"
      GALLERY_MAX_PHOTOS:  "${GALLERY_MAX_PHOTOS:-500}"
      THUMB_CONCURRENCY:   "${THUMB_CONCURRENCY:-4}"
      PRERENDER_CONCURRENCY: "${PRERENDER_CONCURRENCY:-2}"
      VIDEO_STORAGE_PATH:  "/srv/gallerypack/videos"
      VIDEO_MAX_UPLOAD_MB: "${VIDEO_MAX_UPLOAD_MB:-10000}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data/private:/srv/gallerypack/private
      - ./data/public:/srv/gallerypack/public
      - ./data/internal:/srv/gallerypack/internal
    environment:
      NODE_ENV:       "production"
      DB_HOST:        "db"
      DB_PORT:        "3306"
      DB_NAME:        "${DB_NAME:-gallerypack}"
      DB_USER:        "${DB_USER:-gallerypack}"
      DB_PASS:        "${DB_PASS:?DB_PASS is required}"
      BASE_URL:       "${BASE_URL:-http://localhost}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-null}"
      SMTP_HOST:      "${SMTP_HOST:-}"
      SMTP_PORT:      "${SMTP_PORT:-587}"
      SMTP_USER:      "${SMTP_USER:-}"
      SMTP_PASS:      "${SMTP_PASS:-}"
      SMTP_FROM:      "${SMTP_FROM:-}"

  video-worker:
    build:
      context: .
      dockerfile: Dockerfile.video-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data/videos:/srv/gallerypack/videos   # video source files + HLS output
    environment:
      NODE_ENV:                    "production"
      DB_HOST:                     "db"
      DB_PORT:                     "3306"
      DB_NAME:                     "${DB_NAME:-gallerypack}"
      DB_USER:                     "${DB_USER:-gallerypack}"
      DB_PASS:                     "${DB_PASS:?DB_PASS is required}"
      VIDEO_STORAGE_PATH:          "/srv/gallerypack/videos"
      VIDEO_MAX_UPLOAD_MB:         "${VIDEO_MAX_UPLOAD_MB:-10000}"
      VIDEO_TRANSCODE_TIMEOUT_SEC: "${VIDEO_TRANSCODE_TIMEOUT_SEC:-10800}"
      VIDEO_HLS_SEGMENT_SEC:       "${VIDEO_HLS_SEGMENT_SEC:-6}"
      VIDEO_HLS_1080P_BITRATE:     "${VIDEO_HLS_1080P_BITRATE:-4000k}"
      VIDEO_HLS_720P_BITRATE:      "${VIDEO_HLS_720P_BITRATE:-2000k}"
      VIDEO_HLS_480P_BITRATE:      "${VIDEO_HLS_480P_BITRATE:-800k}"
      VIDEO_HLS_AUDIO_BITRATE:     "${VIDEO_HLS_AUDIO_BITRATE:-128k}"
      FFMPEG_PATH:                 "ffmpeg"
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').existsSync('/tmp/video-worker.alive') && (Date.now() - require('fs').statSync('/tmp/video-worker.alive').mtimeMs < 120000) ? process.exit(0) : process.exit(1)"]
      interval: 60s
      timeout: 10s
      start_period: 15s
      retries: 2

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      BASE_DOMAIN: "${BASE_DOMAIN:-gallerypack.app}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/public:/srv/gallerypack/public:ro  # built galleries served as static files
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_config:
